<!DOCTYPE html>
<html>
<head>

    <style>
        .qara {
            background-color: black;
            color: white;
            border: none;
            height: 30px;
            width: 80px;
        }

        button:hover {
            background-color: yellow;
            color: black;
        }

        .sari {
            background-color: yellow;
            color: black;
            border: none;
            border-radius: 10px;
            height: 20px;
        }

        .sari:hover {
            background-color: black;
            color: yellow;
        }

        .aq {
            background-color: white;
            color: gray;
            border-style: solid;
            border-radius: 10px;
            height: 30px;
        }

        .aq:hover {
            background-color: gray;
            color: white;
        }
    </style>
</head>
<body>

    <button class="qara">Sorawnama</button>
    <button class="sari">Korzinkaǵa qosiw</button>
    <button class="aq">Juklep aliw</button>

</body>
</html>
